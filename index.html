<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="theme-color" content="#06255a" />
    <title>ELO Gestão de KPIs</title>
    <style>
      :root {
  --navy: #06255a;
  --blue: #087dd8;
  --cyan: #00a8e1;
  --green: #0f9d66;
  --orange: #f57c00;
  --red: #d94343;
  --ink: #082653;
  --muted: #64748b;
  --line: #d8e2ef;
  --bg: #f3f7fc;
  --card: #fff;
  --font: 16px;
}
* {
  box-sizing: border-box;
}
html {
  font-size: var(--font);
}
body {
  margin: 0;
  font-family:
    Inter,
    ui-sans-serif,
    system-ui,
    -apple-system,
    "Segoe UI",
    sans-serif;
  color: var(--ink);
  background: var(--bg);
}
button,
input,
select {
  font: inherit;
  color: inherit;
}
button {
  cursor: pointer;
}
.hidden {
  display: none !important;
}
.login-page {
  min-height: 100vh;
  display: grid;
  place-items: center;
  padding: 24px;
  background:
    radial-gradient(circle at 70% 15%, #d8edff 0, transparent 35%),
    linear-gradient(145deg, #edf6ff, #fff);
}
.login-card {
  width: min(440px, 100%);
  padding: 38px;
  border: 1px solid var(--line);
  border-radius: 24px;
  background: #ffffffee;
  box-shadow: 0 24px 70px #06255a22;
}
.brand {
  display: flex;
  align-items: center;
  gap: 12px;
}
.login-card .brand {
  justify-content: center;
  margin-bottom: 30px;
}
.login-card h1 {
  text-align: center;
  font-size: 24px;
  margin: 0 0 8px;
}
.login-card > p {
  text-align: center;
  color: var(--muted);
  margin: 0 0 24px;
}
.field {
  display: grid;
  gap: 7px;
  margin: 14px 0;
}
.field label,
.filter label {
  font-weight: 750;
  font-size: 0.86rem;
}
.input {
  width: 100%;
  border: 1px solid #cbd8e8;
  border-radius: 10px;
  padding: 12px 13px;
  background: #fff;
  outline: none;
}
.input:focus {
  border-color: var(--blue);
  box-shadow: 0 0 0 3px #087dd81a;
}
.btn {
  border: 0;
  border-radius: 10px;
  padding: 11px 16px;
  font-weight: 750;
  background: #edf3fa;
}
.btn-primary {
  background: linear-gradient(135deg, #086cc2, #06a5df);
  color: white;
  box-shadow: 0 8px 18px #0788d02c;
}
.btn-danger {
  color: #b42318;
  background: #fff1f0;
}
.btn-block {
  width: 100%;
}
.login-links {
  display: flex;
  justify-content: space-between;
  margin-top: 17px;
  font-size: 0.88rem;
}
.link {
  border: 0;
  background: none;
  padding: 0;
  color: #0878cd;
  font-weight: 700;
}
.demo-note {
  font-size: 0.78rem !important;
  background: #f2f7fd;
  padding: 10px;
  border-radius: 9px;
  margin-top: 20px !important;
}
.app-shell {
  min-height: 100vh;
  display: grid;
  grid-template-columns: 250px 1fr;
}
.sidebar {
  position: sticky;
  top: 0;
  height: 100vh;
  background: linear-gradient(180deg, #052659, #031b43);
  color: white;
  padding: 22px 14px;
  display: flex;
  flex-direction: column;
  z-index: 20;
}
.sidebar .brand {
  padding: 0 10px 24px;
}
.menu {
  display: grid;
  gap: 7px;
}
.menu-btn {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 13px;
  border-radius: 10px;
  border: 0;
  background: transparent;
  color: #dcecff;
  text-align: left;
}
.menu-btn:hover,
.menu-btn.active {
  background: linear-gradient(90deg, #087bd0, #09a7df);
  color: #fff;
}
.menu-btn .ico {
  font-size: 20px;
  width: 24px;
  text-align: center;
}
.sidebar-foot {
  margin-top: auto;
  display: grid;
  gap: 10px;
}
.user-chip {
  display: flex;
  gap: 10px;
  align-items: center;
  padding: 12px;
  background: #ffffff10;
  border-radius: 12px;
}
.avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: #fff;
  color: var(--navy);
  display: grid;
  place-items: center;
  font-weight: 900;
}
.sidebar-toggle {
  position: absolute;
  right: -14px;
  top: 50%;
  width: 28px;
  height: 42px;
  border: 0;
  border-radius: 0 12px 12px 0;
  background: #12376d;
  color: white;
}
.collapsed {
  grid-template-columns: 78px 1fr;
}
.collapsed .sidebar {
  padding-inline: 10px;
}
.collapsed .menu-label,
.collapsed .brand div,
.collapsed .user-chip div {
  display: none;
}
.collapsed .menu-btn {
  justify-content: center;
}
.main {
  min-width: 0;
}
.topbar {
  height: 72px;
  background: #fff;
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  position: sticky;
  top: 0;
  z-index: 15;
}
.page-title h1 {
  font-size: 1.35rem;
  margin: 0;
}
.page-title p {
  margin: 3px 0 0;
  color: var(--muted);
  font-size: 0.82rem;
}
.top-actions {
  display: flex;
  gap: 8px;
  align-items: center;
}
.content {
  padding: 20px;
}
.tabs {
  display: flex;
  gap: 28px;
  border-bottom: 1px solid var(--line);
  background: white;
  padding: 0 22px;
}
.tab {
  padding: 15px 0;
  border: 0;
  background: none;
  font-weight: 750;
  color: #53657d;
  border-bottom: 3px solid transparent;
}
.tab.active {
  color: #0877c9;
  border-color: #08a3df;
}
.filters {
  display: grid;
  grid-template-columns: 1.45fr 1fr 1fr auto;
  gap: 14px;
  background: white;
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 16px;
  margin: 16px 0;
}
.filter {
  display: grid;
  gap: 6px;
}
.date-control {
  position: relative;
}
.date-display {
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.calendar-pop {
  position: absolute;
  top: calc(100% + 8px);
  left: 0;
  width: min(560px, 92vw);
  padding: 15px;
  background: white;
  border: 1px solid var(--line);
  border-radius: 14px;
  box-shadow: 0 18px 50px #06255a2b;
  z-index: 50;
}
.panel {
  background: white;
  border: 1px solid var(--line);
  border-radius: 15px;
  overflow: hidden;
}
.panel-head {
  padding: 16px 18px;
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 15px;
}
.panel-head h2 {
  font-size: 1.05rem;
  margin: 0;
}
.panel-head p {
  margin: 4px 0 0;
  color: var(--muted);
  font-size: 0.84rem;
}
.font-tools {
  display: flex;
  align-items: center;
}
.font-tools button,
.font-tools span {
  border: 1px solid var(--line);
  background: #f7fafe;
  padding: 8px 11px;
}
.save-state {
  color: #087b4b;
  font-weight: 700;
  font-size: 0.82rem;
}
.table-wrap {
  overflow: auto;
  max-height: 62vh;
  scrollbar-color: #7f93ad #e8eef6;
  scrollbar-width: auto;
}
.launch-table {
  border-collapse: separate;
  border-spacing: 0;
  min-width: 2600px;
  width: 100%;
  font-size: 0.88rem;
}
.launch-table th,
.launch-table td {
  padding: 8px;
  border-right: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
  background: white;
  text-align: center;
  min-width: 68px;
}
.launch-table thead th {
  position: sticky;
  top: 0;
  background: #eef5fc;
  z-index: 5;
}
.launch-table .indicator-cell {
  position: sticky;
  left: 0;
  z-index: 6;
  width: 330px;
  min-width: 330px;
  max-width: 500px;
  text-align: left;
  background: white;
  padding-left: 16px;
  resize: horizontal;
  overflow: auto;
}
.launch-table thead .indicator-cell {
  z-index: 8;
  background: #eaf3fc;
}
.indicator-cell strong {
  display: block;
}
.indicator-cell small {
  color: var(--muted);
}
.cell-inputs {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 3px;
}
.cell-inputs input {
  width: 58px;
  padding: 8px 4px;
  text-align: center;
  border: 1px solid #d3deeb;
  border-radius: 7px;
}
.total-col {
  position: sticky !important;
  background: #edf5ff !important;
  font-weight: 800;
}
.launch-footer {
  position: sticky;
  bottom: 0;
  padding: 14px 18px;
  background: white;
  border-top: 1px solid var(--line);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.charts-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(280px, 1fr));
  gap: 14px;
}
.chart-card {
  position: relative;
  background: white;
  border: 1px solid var(--line);
  border-top: 4px solid var(--accent, #087dd8);
  border-radius: 15px;
  padding: 16px;
  min-height: 390px;
  overflow: hidden;
}
.chart-head {
  display: flex;
  justify-content: space-between;
  gap: 8px;
}
.chart-head h3 {
  font-size: 1rem;
  margin: 0;
}
.chart-head p {
  font-size: 0.78rem;
  color: var(--muted);
  margin: 5px 0;
}
.badge {
  background: #f2f6fa;
  border-radius: 20px;
  padding: 7px 10px;
  font-size: 0.72rem;
  font-weight: 750;
  white-space: nowrap;
}
.metric {
  font-size: 1.7rem;
  font-weight: 900;
  margin: 18px 0 8px;
}
.delta {
  color: #098a56;
  font-size: 0.78rem;
  font-weight: 800;
}
.delta.negative {
  color: #c92a2a;
}
.chart {
  height: 180px;
  margin: 4px 0 0;
  display: grid;
  place-items: center;
}
.chart svg {
  width: 100%;
  height: 100%;
  overflow: visible;
}
.chart text {
  font-size: 10px;
  fill: #526884;
}
.chart .value-label {
  font-size: 9px;
  font-weight: 800;
  fill: #082653;
}
.periods {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  border-top: 1px solid var(--line);
  margin-top: 5px;
}
.period-btn {
  border: 0;
  border-right: 1px solid var(--line);
  background: white;
  padding: 8px;
  text-align: left;
}
.period-btn:hover {
  background: #eef7ff;
}
.period-btn span {
  display: block;
  color: #718199;
  font-size: 0.67rem;
}
.period-btn strong {
  font-size: 0.82rem;
}
.detail-link {
  border: 0;
  background: none;
  color: var(--accent);
  font-weight: 750;
  padding: 10px 0 0;
}
.modal-backdrop {
  position: fixed;
  inset: 0;
  background: #041a3d99;
  z-index: 100;
  display: grid;
  place-items: center;
  padding: 18px;
}
.modal {
  width: min(620px, 100%);
  max-height: 90vh;
  overflow: auto;
  background: #fff;
  border-radius: 18px;
  box-shadow: 0 25px 80px #00133380;
  padding: 24px;
}
.modal h2 {
  margin: 0 0 10px;
}
.modal-actions {
  display: flex;
  justify-content: flex-end;
  gap: 10px;
  margin-top: 20px;
}
.admin-layout {
  display: grid;
  grid-template-columns: 1.3fr 0.7fr;
  gap: 16px;
}
.user-list {
  width: 100%;
  border-collapse: collapse;
}
.user-list th,
.user-list td {
  padding: 11px;
  border-bottom: 1px solid var(--line);
  text-align: left;
}
.switch {
  accent-color: #087bd0;
  width: 18px;
  height: 18px;
}
.toast {
  position: fixed;
  right: 22px;
  bottom: 22px;
  z-index: 200;
  padding: 14px 18px;
  border-radius: 12px;
  background: #092d60;
  color: white;
  box-shadow: 0 12px 30px #001e4b55;
}
.empty {
  padding: 50px;
  text-align: center;
  color: var(--muted);
}
.mobile-menu {
  display: none;
}
.error {
  color: #b42318;
  background: #fff1f0;
  padding: 10px;
  border-radius: 8px;
  font-size: 0.84rem;
}
.success {
  color: #087b4b;
  background: #ecf9f2;
  padding: 10px;
  border-radius: 8px;
  font-size: 0.84rem;
}
@media (max-width: 1100px) {
  .charts-grid {
    grid-template-columns: repeat(2, minmax(280px, 1fr));
  }
  .filters {
    grid-template-columns: 1fr 1fr;
  }
  .admin-layout {
    grid-template-columns: 1fr;
  }
}
@media (max-width: 760px) {
  .app-shell {
    display: block;
  }
  .sidebar {
    position: fixed;
    left: -260px;
    width: 250px;
    transition: 0.2s;
  }
  .sidebar.open {
    left: 0;
  }
  .sidebar-toggle {
    display: none;
  }
  .mobile-menu {
    display: inline-flex;
  }
  .topbar {
    padding: 0 12px;
  }
  .content {
    padding: 12px;
  }
  .filters {
    grid-template-columns: 1fr;
  }
  .charts-grid {
    grid-template-columns: 1fr;
  }
  .panel-head {
    align-items: flex-start;
    flex-direction: column;
  }
  .launch-table .indicator-cell {
    min-width: 240px;
    width: 240px;
  }
  .chart-card {
    min-height: 380px;
  }
}

.brand {
  justify-content: center;
}
.brand img {
  display: block;
  width: 210px;
  max-width: 100%;
  height: auto;
  background: white;
  border-radius: 8px;
}
.login-card .brand img {
  width: 280px;
}
.calendar-picker {
  width: 390px;
  padding: 12px 14px;
}
.cal-head {
  display: grid;
  grid-template-columns: 1fr 34px 34px;
  align-items: center;
  gap: 3px;
}
.cal-period {
  display: flex;
  align-items: center;
  gap: 3px;
}
.cal-period select {
  appearance: auto;
  border: 0;
  background: white;
  color: #082653;
  font-weight: 850;
  font-size: 0.82rem;
  text-transform: lowercase;
  padding: 5px 1px;
  cursor: pointer;
}
.cal-period select:focus {
  outline: 2px solid #9fd5ff;
  border-radius: 4px;
}
.cal-period span {
  font-size: 0.78rem;
  font-weight: 700;
}
.cal-nav {
  border: 0;
  background: white;
  font-size: 20px;
  padding: 4px;
  border-radius: 5px;
}
.cal-nav:hover {
  background: #edf5ff;
}
.cal-instruction {
  font-size: 0.7rem;
  color: #64748b;
  margin: 5px 0 3px;
}
.cal-week,
.cal-days {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  text-align: center;
}
.cal-week b {
  padding: 7px 0;
  font-size: 0.72rem;
}
.cal-day {
  height: 34px;
  border: 0;
  background: white;
  border-radius: 3px;
  font-size: 0.75rem;
}
.cal-day:hover {
  background: #dceeff;
}
.cal-day.outside {
  color: #9aa8ba;
}
.cal-day.in-range {
  background: #e2f1ff;
  border-radius: 0;
}
.cal-day.selected {
  background: #087dd8;
  color: white;
  font-weight: 900;
}
.cal-selection {
  margin-top: 8px;
  padding: 7px 9px;
  border-radius: 7px;
  background: #f1f6fb;
  text-align: center;
  font-size: 0.78rem;
  font-weight: 750;
}
.cal-quick {
  display: grid;
  grid-template-columns: 1fr 1fr 1.25fr;
  gap: 6px;
  margin-top: 8px;
}
.cal-quick .btn {
  padding: 8px 5px;
  font-size: 0.75rem;
}
.cal-quick .btn:disabled {
  opacity: 0.45;
  cursor: not-allowed;
}
.cal-footer {
  display: flex;
  justify-content: space-between;
  padding: 10px 2px 2px;
}
.launch-scope {
  display: inline-block !important;
  margin-top: 8px !important;
  padding: 6px 10px;
  border-radius: 999px;
  background: #e7f4ff;
  color: #0869b4 !important;
  font-weight: 800 !important;
}
.filter label small {
  font-weight: 600;
  color: #64748b;
}
.filter select:disabled {
  background: #eef4fa;
  color: #334e6f;
  opacity: 1;
}
.client-logo {
  position: relative;
  flex: 0 0 38px;
  width: 38px;
  height: 38px;
  display: grid;
  place-items: center;
  border-radius: 10px;
  overflow: hidden;
}
.client-logo svg,
.client-logo img {
  display: block;
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
}
.shopee-logo,
.amazon-logo {
  background: #fff;
  padding: 7px;
}
.shopee-logo svg {
  width: 25px;
  height: 25px;
}
.amazon-logo svg {
  width: 27px;
  height: 27px;
}
.ml-logo {
  background: #ffe600;
  padding: 3px;
}
.ml-logo img {
  width: 34px;
  height: 27px;
}
.menu-btn.active .client-logo {
  box-shadow: 0 0 0 2px #ffffff66;
}
.detail-modal {
  position: relative;
  width: min(980px, 96vw);
}
.detail-modal-close {
  position: sticky;
  top: 0;
  z-index: 3;
  float: right;
  display: grid;
  place-items: center;
  width: 42px;
  height: 42px;
  margin: -8px -8px 4px 16px;
  border: 1px solid #c9d8ea;
  border-radius: 50%;
  background: #fff;
  color: #0a2b59;
  box-shadow: 0 5px 16px #06234c24;
  font:
    700 28px/1 Arial,
    sans-serif;
  cursor: pointer;
}
.detail-modal-close:hover {
  border-color: #087dd8;
  background: #eef7ff;
  color: #087dd8;
}
.detail-modal-close:focus-visible {
  outline: 3px solid #69b9f4;
  outline-offset: 2px;
}
.detail-chart {
  display: block !important;
  height: 390px !important;
  margin-top: 14px;
  overflow-x: auto;
  overflow-y: hidden;
}
.detail-chart svg {
  height: 350px !important;
}
.pair-legend text {
  fill: #415875;
  font-size: 11px;
  font-weight: 750;
}
.chart-card {
  min-height: 445px;
}
.chart-card .chart {
  height: 235px;
}
.chart-card .chart text {
  font-size: 11px;
}
.chart-card .chart .value-label {
  font-size: 10.5px;
}

    </style>
  </head>

  }

      })

      })

async function saveLaunches() {

    group = new Map();

    const k = x.dataset.ind + "|" + x.dataset.date;
    if (!group.has(k))
      group.set(k, {
        client: state.client,
        base: state.base,
        operation: state.operation,
        date: x.dataset.date,
        indicator: x.dataset.ind,
        value1: "",
        value2: "",
      });
    group.get(k)[`value${x.dataset.v}`] = x.value;
  });
  const payload = [...group.values()].filter(
    (x) => x.value1 !== "" || x.value2 !== "",
  );
  const indicatorTypes = new Map(
      CLIENTS[state.client].indicators.map((indicator) => [
        indicator[0],
        indicator[3],
      ]),
    ),
    errors = payload.flatMap((item) =>
      validateLaunch(item, indicatorTypes.get(item.indicator)),
    );
  if (state.base === "Todos" || state.operation === "Todos")
    return toast(
      "Para lançar dados, selecione uma base e uma operação específicas.",
    );
  if (errors.length) return toast(errors[0]);
  try {
    await server.call("saveLaunches", state.token, payload);
    toast(`${payload.length} lançamentos salvos com segurança.`);

  }

function localIso(d) {
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
}
function detailPlan(period) {
  const normalized = String(period)
      .normalize("NFD")
      .replace(/[\u0300-\u036f]/g, "")
      .toLowerCase(),
    mode = normalized === "day" ? "dia" : normalized,
    today = new Date(TODAY_ISO + "T12:00:00"),
    selected = new Date(state.dateTo + "T12:00:00"),
    ref = selected > today ? today : selected;
  if (mode === "mes") {
    const from = new Date(today.getFullYear(), 0, 1),
      labels = [];
    for (let m = 0; m <= today.getMonth(); m++)
      labels.push({
        label: [
          "JAN",
          "FEV",
          "MAR",
          "ABR",
          "MAI",
          "JUN",
          "JUL",
          "AGO",
          "SET",
          "OUT",
          "NOV",
          "DEZ",
        ][m],
        key: `${today.getFullYear()}-${String(m + 1).padStart(2, "0")}`,
      });
    return { mode, from: localIso(from), to: TODAY_ISO, labels };
  }
  if (mode === "semana") {
    const monday = new Date(ref);
    monday.setDate(ref.getDate() - ((ref.getDay() + 6) % 7));
    const sunday = new Date(monday);
    sunday.setDate(monday.getDate() + 6);
    const labels = dailyDetailLabels(monday, sunday);
    return { mode, from: localIso(monday), to: localIso(sunday), labels };
  }
  if (mode === "ano") {
    const labels = [];
    for (let y = 2026; y <= today.getFullYear(); y++)
      labels.push({ label: String(y), key: String(y) });
    return { mode, from: "2026-01-01", to: TODAY_ISO, labels };
  }
  const first = new Date(ref.getFullYear(), ref.getMonth(), 1),
    last = new Date(ref.getFullYear(), ref.getMonth() + 1, 0),
    labels = dailyDetailLabels(first, last);
  return { mode: "dia", from: localIso(first), to: localIso(last), labels };
}
function dailyDetailLabels(from, to) {
  const labels = [];
  for (let date = new Date(from); date <= to; date.setDate(date.getDate() + 1))
    labels.push({
      label: date.toLocaleDateString("pt-BR", {
        day: "2-digit",
        month: "2-digit",
      }),
      key: localIso(date),
    });
  return labels;
}
function detailBuckets(records, indicator, plan) {
  const totals = new Map(
    plan.labels.map((x) => [x.key, { value: 0, value2: 0 }]),
  );
  records
    .filter((r) => r.indicator === indicator)
    .forEach((r) => {
      const key =
        plan.mode === "mes"
          ? r.date.slice(0, 7)
          : plan.mode === "ano"
            ? r.date.slice(0, 4)
            : r.date;
      if (totals.has(key)) {
        const total = totals.get(key);
        total.value += Number(r.value1) || 0;
        total.value2 += Number(r.value2) || 0;
      }
    });
  return plan.labels.map((x) => ({
    label: x.label,
    ...totals.get(x.key),
  }));
}

    html = `<h2>Recuperar senha</h2><form id="identifyForm"><div class="field"><label>Usuário</label><input class="input" name="username" required></div><div class="field"><label>E-mail cadastrado</label><input class="input" type="email" name="email" required></div><button class="btn btn-primary" type="submit">Continuar</button></form>`;
  else
    html = `<h2>Cadastrar usuário</h2><form id="registerForm"><div class="field"><label>Nome completo</label><input class="input" name="name" required></div><div class="field"><label>Usuário</label><input class="input" name="username" required></div><div class="field"><label>E-mail</label><input class="input" type="email" name="email" required></div><div class="field"><label>Senha (mínimo 10 caracteres)</label><input class="input" type="password" name="password" minlength="10" required></div><div class="field"><label>Pergunta secreta</label><input class="input" name="question" required></div><div class="field"><label>Resposta secreta</label><input class="input" name="answer" required></div><button class="btn btn-primary" type="submit">Cadastrar</button></form>`;
  $("#app").insertAdjacentHTML(
    "beforeend",
    `<div class="modal-backdrop"><div class="modal">${html}<div class="modal-actions"><button class="btn" data-close>Fechar</button></div></div></div>`,
  );
  $("[data-close]").onclick = () => $(".modal-backdrop").remove();
  $("#registerForm")?.addEventListener("submit", async (e) => {
    e.preventDefault();
    await server.call(
      "registerUser",
      Object.fromEntries(new FormData(e.target)),
    );
    toast("Cadastro enviado. Aguarde ativação do administrador.");
    $(".modal-backdrop").remove();
  });
  $("#identifyForm")?.addEventListener("submit", async (e) => {
    e.preventDefault();
    const identity = Object.fromEntries(new FormData(e.target));
    try {
      const q = await server.call(
        "getRecoveryQuestion",
        identity.username,
        identity.email,
      );
      $(".modal").innerHTML =
        `<h2>Confirme sua identidade</h2><form id="forgotForm"><p class="success">${esc(q.question)}</p><div class="field"><label>Resposta secreta</label><input class="input" name="answer" required></div><button class="btn btn-primary">Validar resposta</button></form>`;
      $("#forgotForm").onsubmit = async (x) => {
        x.preventDefault();
        try {
          const r = await server.call("requestPasswordReset", {
            ...identity,
            answer: x.target.answer.value,
          });
          $(".modal").innerHTML =
            `<h2>Definir nova senha</h2><form id="resetForm"><div class="field"><label>Nova senha</label><input class="input" type="password" name="password" minlength="10" required></div><button class="btn btn-primary">Alterar senha</button></form>`;
          $("#resetForm").onsubmit = async (y) => {
            y.preventDefault();
            await server.call(
              "resetPassword",
              r.token,
              y.target.password.value,
            );
            toast("Senha alterada.");
            $(".modal-backdrop").remove();
          };
        } catch (err) {
          toast(err.message);
        }
      };
    } catch (err) {
      toast(err.message);
    }
  });
}
async function loadUsers() {
  try {
    const users = await server.call("getUsers", state.token);
    $("#users").innerHTML =
      `<table class="user-list"><thead><tr><th>Usuário</th><th>Perfil</th><th>Clientes liberados</th><th>Ativo</th><th>Senha</th></tr></thead><tbody>${users
        .map(
          (u) =>
            `<tr><td><b>${esc(u.name)}</b><small style="display:block">${esc(u.username)} • ${u.online ? "🟢 online" : "offline"}</small></td><td>${u.role}</td><td>${Object.keys(
              CLIENTS,
            )
              .map(
                (k) =>
                  `<label style="display:block"><input class="switch perm" type="checkbox" data-user="${u.username}" data-client="${k}" ${u.permissions.includes(k) ? "checked" : ""}> ${CLIENTS[k].label}</label>`,
              )
              .join(
                "",
              )}</td><td><input class="switch active-user" type="checkbox" data-user="${u.username}" ${u.active ? "checked" : ""}></td><td><button class="btn reset-user" data-user="${u.username}">Redefinir</button></td></tr>`,
        )
        .join("")}</tbody></table>`;
    document.querySelectorAll(".perm,.active-user").forEach(
      (x) =>
        (x.onchange = () =>
          server
            .call("updateUser", state.token, {
              username: x.dataset.user,
              client: x.dataset.client,
              checked: x.checked,
              field: x.classList.contains("perm") ? "permission" : "active",
            })
            .then(() => toast("Acesso atualizado."))),
    );
    document
      .querySelectorAll(".reset-user")
      .forEach((x) => (x.onclick = () => adminReset(x.dataset.user)));
  } catch (e) {
    $("#users").innerHTML = `<p class="error">${esc(e.message)}</p>`;
  }
}
function adminReset(username) {
  $("#app").insertAdjacentHTML(
    "beforeend",
    `<div class="modal-backdrop"><div class="modal"><h2>Redefinir senha — ${esc(username)}</h2><form id="adminReset"><div class="field"><label>Nova senha temporária</label><input class="input" type="password" name="password" minlength="10" required></div><button class="btn btn-primary">Salvar nova senha</button></form><div class="modal-actions"><button class="btn" data-close>Cancelar</button></div></div></div>`,
  );
  $("[data-close]").onclick = () => $(".modal-backdrop").remove();
  $("#adminReset").onsubmit = async (e) => {
    e.preventDefault();
    await server.call(
      "adminResetPassword",
      state.token,
      username,
      e.target.password.value,
    );
    toast("Senha redefinida pelo administrador.");
    $(".modal-backdrop").remove();
  };
}
const saved = sessionStorage.getItem("eloSession");
if (saved) {
  try {
    const r = JSON.parse(saved);
    state.user = r.user;
    state.token = r.token;
    server
      .call("getLaunches", r.token, state.client, {
        from: state.dateFrom,
        to: state.dateTo,
        base: "Todos",
        operation: "Todos",
      })
      .then((x) => {
        state.records = x;
        render();
      })
      .catch(() => {
        state.user = null;
        state.token = null;
        render();
      });
  } catch {
    render();
  }
} else render();

    </script>
  </body>
</html>
